aid: budibase
name: Budibase
description: >-
  Budibase is an open source low-code platform for building AI agents, internal
  tools, and workflow automations. It enables teams to connect databases,
  spreadsheets, and business systems, then build applications and automations on
  top without extensive coding. Used by over 300,000 teams ranging from SMEs to
  government organizations, Budibase accelerates the delivery of internal
  business applications and process automation.
type: Index
