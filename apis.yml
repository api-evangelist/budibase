apis:
  - aid: budibase:budibase-rest-api
    name: Budibase REST API
    description: >-
      The Budibase Public API provides programmatic access to Budibase resources
      including applications, tables, rows, users, queries, and automations. It
      enables external systems to read and write Budibase data, trigger
      automations, and manage platform resources. Authentication is via an API
      key generated in account settings.
    humanURL: https://docs.budibase.com/docs/public-api
    tags:
      - Applications
      - Automation
      - Low-Code
      - Tables
      - Users
    properties:
      - type: Documentation
        url: https://docs.budibase.com/docs/public-api
      - type: Authentication
        url: https://docs.budibase.com/docs/public-api#authentication
      - type: OpenAPI
        url: https://budibase.com/api/public/v1/openapi.json
